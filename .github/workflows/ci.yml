name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Check Python syntax
        run: |
          find . -name "*.py" -exec python -m py_compile {} \;
          echo "All Python files compile successfully"
      
      - name: Verify writeups exist
        run: |
          count=$(find . -name "*.md" -o -name "*.py" | wc -l)
          echo "Found $count writeup files"
          [ "$count" -gt 0 ] || exit 1